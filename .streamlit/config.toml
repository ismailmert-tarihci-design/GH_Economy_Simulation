[server]
headless = true
port = 8501
maxUploadSize = 200
enableCORS = false
enableXsrfProtection = true

[logger]
level = "info"

[browser]
gatherUsageStats = false

# ─── Bluestar Economy Simulator — Soft Light Theme ───────────────────────────
# Optimized for readability of dense tables and data editors.
# Soft white base, clear contrast, blue accent matching the "Bluestar" brand.

[theme]
base = "light"
primaryColor = "#2563EB"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F8FAFC"
textColor = "#1E293B"

linkColor = "#2563EB"
codeTextColor = "#1E40AF"
codeBackgroundColor = "#F1F5F9"
borderColor = "#CBD5E1"
showWidgetBorder = true
showSidebarBorder = true

# Typography — Outfit: geometric, modern, distinctive
font = "Outfit:https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
headingFont = "Outfit:https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&display=swap"
codeFont = "'JetBrains Mono':https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"

baseFontSize = 14
baseFontWeight = 400
codeFontSize = "13px"
codeFontWeight = 400
headingFontSizes = ["30px", "22px", "18px", "15px", "13px", "12px"]
headingFontWeights = [600, 600, 600, 500, 500, 500]
linkUnderline = false

# Radius
baseRadius = "8px"
buttonRadius = "8px"

# Semantic colors — vivid but not harsh
blueColor = "#2563EB"
greenColor = "#16A34A"
yellowColor = "#CA8A04"
orangeColor = "#EA580C"
redColor = "#DC2626"
violetColor = "#7C3AED"
grayColor = "#64748B"

# Chart palette — strong contrast on white
chartCategoricalColors = ["#2563EB", "#16A34A", "#EA580C", "#DC2626", "#7C3AED", "#CA8A04", "#0891B2", "#DB2777"]

# Dataframes — high contrast for readability
dataframeBorderColor = "#CBD5E1"
dataframeHeaderBackgroundColor = "#E2E8F0"

# Sidebar — slightly tinted
[theme.sidebar]
backgroundColor = "#F8FAFC"
secondaryBackgroundColor = "#F1F5F9"
codeBackgroundColor = "#F1F5F9"
textColor = "#1E293B"
borderColor = "#CBD5E1"
primaryColor = "#2563EB"
